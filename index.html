<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f7f8fa" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('speck-theme');
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          if (t === 'dark') document.documentElement.classList.add('dark');
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute('content', t === 'dark' ? '#090b11' : '#f7f8fa');
        } catch (e) {}
      })();
    </script>
    <title>Speck — Video Motion Analysis</title>
    <meta
      name="description"
      content="Speck turns any video into position, velocity, and acceleration data — one tracked point at a time. Built for the physics classroom."
    />
    <meta property="og:title" content="Speck — See it. Track it. Solve it." />
    <meta
      property="og:description"
      content="Turn any video into publication-quality motion data. Built for physics students and teachers."
    />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
